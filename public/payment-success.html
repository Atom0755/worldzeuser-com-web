<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Success</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 24px; }
    .card { max-width: 720px; margin: 0 auto; padding: 24px; border: 1px solid #eee; border-radius: 16px; }
    h1 { margin: 0 0 12px; }
    p { line-height: 1.6; }
    a.btn {
      display: inline-block; margin-top: 16px; padding: 10px 14px;
      border-radius: 10px; text-decoration: none; border: 1px solid #ddd;
    }
    .muted { color: #666; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment successful 🎉</h1>
    <p>
      Subscription will be activated shortly (usually within a few seconds).
      Please return to the admin page and refresh to see the latest status.
    </p>

    <a class="btn" href="https://uscgcc.worldzeuser.com/admin-simple.html">
      Go to Admin / Dashboard
    </a>

    <div class="muted">
      Tip: If the status hasn’t updated yet, wait 5–10 seconds and refresh once.
    </div>
  </div>
</body>
</html>
